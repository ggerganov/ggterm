"$schema" = 'https://starship.rs/config-schema.json'

# Timeout for commands executed by starship (in milliseconds).
command_timeout = 5000

format = """
$hostname\
$git_branch\
$git_status\
$git_metrics\
$c\
$directory\
$line_break\
$time\
$status\
$character"""

#palette = 'gruvbox_dark'
#
#[palettes.gruvbox_dark]
#color_fg0 = '#fbf1c7'
#color_bg1 = '#3c3836'
#color_bg3 = '#665c54'
#color_blue = '#458588'
#color_aqua = '#689d6a'
#color_aqua_dark = '#385d3a'
#color_green = '#98971a'
#color_orange = '#d65d0e'
#color_purple = '#b16286'
#color_red = '#cc241d'
#color_yellow = '#d79921'

[hostname]
disabled = false
ssh_only = true
style = 'bg:color_orange fg:color_fg0'
format = '[ūüď° $hostname ]($style)'

[os]
disabled = false
style = 'bg:color_orange fg:color_fg0'

[os.symbols]
Windows = 'ůįć≤'
Ubuntu = 'ůįēą'
SUSE = 'ÔĆĒ'
Raspbian = 'ůįźŅ'
Mint = 'ůį£≠'
Macos = 'ůįÄĶ'
Manjaro = 'ÔĆí'
Linux = 'ůįĆĹ'
Gentoo = 'ůį£®'
Fedora = 'ůį£õ'
Alpine = 'ÔĆÄ'
Amazon = 'ÔČį'
Android = 'Óúé'
Arch = 'ůį£á'
Artix = 'ůį£á'
EndeavourOS = 'ÔÜó'
CentOS = 'ÔĆĄ'
Debian = 'ůį£ö'
Redhat = 'ůĪĄõ'
RedHatEnterprise = 'ůĪĄõ'
Pop = 'ÔĆ™'

[username]
show_always = true
style_user = 'bg:color_orange fg:color_fg0'
style_root = 'bg:color_red    fg:color_fg0'
format = '[ $user ]($style)'

[directory]
style = 'fg:color_fg0 bg:color_bg1'
format = '[ $path ]($style)'
truncate_to_repo = false
truncation_length = 0
truncation_symbol = '‚Ä¶/'

[directory.substitutions]
'Documents' = 'ůįąô '
'Downloads' = 'ÔÄô '
'Music' = 'ůįĚö '
'Pictures' = 'ÔÄĺ '
'Developer' = 'ůį≤č '

[status]
style = "bold red"
format = "[\\[$status\\]]($style) "
disabled = false

[git_branch]
symbol = 'Ôźė'
style = 'bg:color_aqua_dark'
format = '[[ $symbol $branch ](fg:color_fg0 bg:color_aqua_dark)]($style)'

[git_status]
style = 'bg:color_aqua_dark red bold'
format = '([\[$all_status$ahead_behind\] ]($style))'
stashed = '\$${count}'
ahead = '‚á°${count}'
behind = '‚á£${count}'
diverged = '‚áē${count}'
conflicted = '=${count}'
deleted = '‚úė${count}'
renamed = '¬Ľ${count}'
modified = '¬°${count}'
staged = '+${count}'
untracked = '?${count}'

[git_metrics]
disabled = false
added_style = 'bg:color_bg1 bold green'
deleted_style = 'bg:color_bg1 bold red'
format = '[( [+$added]($added_style) )([-$deleted]($deleted_style) )](bg:color_bg1)'

[nodejs]
symbol = 'Óúė'
style = 'bg:color_blue'
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[c]
symbol = 'Óėě '
style = 'bg:color_blue'
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[rust]
symbol = 'Óě®'
style = 'bg:color_blue'
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[golang]
symbol = 'Óėß'
style = 'bg:color_blue'
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[php]
symbol = 'Óėą'
style = 'bg:color_blue'
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[java]
symbol = 'ÓČĖ'
style = 'bg:color_blue'
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[kotlin]
symbol = 'Óėī'
style = 'bg:color_blue'
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[haskell]
symbol = 'Óėü'
style = 'bg:color_blue'
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[time]
disabled = false
time_format = '%H:%M:%S'
style = 'bg:color_bg1'
format = '[[ $time ](fg:color_fg0 bg:color_bg1)]($style)'

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[Ôź≤](bold fg:color_green)'
error_symbol = '[Ôź≤](bold fg:color_red)'
vimcmd_symbol = '[Ôźī](bold fg:color_green)'
vimcmd_replace_one_symbol = '[Ôźī](bold fg:color_purple)'
vimcmd_replace_symbol = '[Ôźī](bold fg:color_purple)'
vimcmd_visual_symbol = '[Ôźī](bold fg:color_yellow)'
